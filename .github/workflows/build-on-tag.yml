name: Build Debian Package On Tag

on:
  push:
    tags:
      - "*"
  repository_dispatch:
    types:
      - upstream_tag_synced
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to build (optional; defaults to latest tag)
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: build-on-tag-${{ github.event.client_payload.tag || github.ref_name || github.event.inputs.tag || github.run_id }}
  cancel-in-progress: false

jobs:
  build-deb:
    runs-on: ubuntu-22.04

    steps:
      - name: Resolve build parameters
        id: params
        env:
          EVENT_NAME: ${{ github.event_name }}
          PUSH_TAG: ${{ github.ref_name }}
          DISPATCH_TAG: ${{ github.event.client_payload.tag }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          tag=""
          if [[ "${EVENT_NAME}" == "push" ]]; then
            tag="${PUSH_TAG}"
          elif [[ "${EVENT_NAME}" == "repository_dispatch" ]]; then
            tag="${DISPATCH_TAG}"
          else
            tag="${INPUT_TAG}"
          fi

          # Fallback: when event payload has no tag, resolve latest tag from repository API.
          if [[ -z "${tag}" ]]; then
            tag="$(
              GITHUB_TOKEN="${GITHUB_TOKEN}" GITHUB_REPOSITORY="${GITHUB_REPOSITORY}" \
              python3 -c 'import json,os,urllib.request; token=os.environ["GITHUB_TOKEN"]; repo=os.environ["GITHUB_REPOSITORY"]; req=urllib.request.Request(f"https://api.github.com/repos/{repo}/tags?per_page=1", headers={"Authorization": f"Bearer {token}", "Accept": "application/vnd.github+json"}); data=json.load(urllib.request.urlopen(req)); print(data[0]["name"] if data else "")'
            )"
          fi

          if [[ -z "${tag}" ]]; then
            echo "Tag could not be resolved for this run." >&2
            exit 1
          fi

          connections_limit="100"
          connections_file="server/Common/sources/constants.js"
          build_branch="tags/${tag}"
          package_version="${tag#v}"
          package_build="1"

          if [[ "${package_version}" =~ ^([0-9]+\.[0-9]+\.[0-9]+)\.([0-9]+)$ ]]; then
            package_version="${BASH_REMATCH[1]}"
            package_build="${BASH_REMATCH[2]}"
          elif [[ "${package_version}" =~ ^([0-9]+\.[0-9]+\.[0-9]+)-([0-9]+)$ ]]; then
            package_version="${BASH_REMATCH[1]}"
            package_build="${BASH_REMATCH[2]}"
          elif ! [[ "${package_version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Unsupported tag format for package versioning: ${tag}" >&2
            exit 1
          fi

          build_tools_repo="ONLYOFFICE/build_tools"

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "package_version=${package_version}" >> "${GITHUB_OUTPUT}"
          echo "package_build=${package_build}" >> "${GITHUB_OUTPUT}"
          echo "connections_limit=${connections_limit}" >> "${GITHUB_OUTPUT}"
          echo "connections_file=${connections_file}" >> "${GITHUB_OUTPUT}"
          echo "build_branch=${build_branch}" >> "${GITHUB_OUTPUT}"
          echo "build_tools_repo=${build_tools_repo}" >> "${GITHUB_OUTPUT}"

      - name: Checkout tag with submodules
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ steps.params.outputs.tag }}
          fetch-depth: 0
          submodules: false
          token: ${{ github.token }}

      - name: Configure submodules to upstream sources
        run: |
          set -euo pipefail

          while read -r key url; do
            if [[ "${url}" == ../* ]]; then
              repo="${url#../}"
              git config -f .gitmodules "${key}" "https://github.com/ONLYOFFICE/${repo}"
            fi
          done < <(git config -f .gitmodules --get-regexp '^submodule\..*\.url$' || true)

      - name: Initialize submodules
        run: |
          set -euo pipefail
          git config --global url."https://x-access-token:${{ github.token }}@github.com/".insteadOf "https://github.com/"
          git submodule sync --recursive
          git submodule update --init --recursive --jobs 8

      - name: Prepare additional repositories for local build layout
        env:
          TAG: ${{ steps.params.outputs.tag }}
        run: |
          set -euo pipefail

          required_repos=(
            "onlyoffice.github.io"
            "document-server-integration"
            "document-server-package"
            "document-templates"
            "document-formats"
          )

          for repo in "${required_repos[@]}"; do
            if [[ -d "${repo}/.git" ]]; then
              echo "Repository already present: ${repo}"
              continue
            fi

            repo_url="https://github.com/ONLYOFFICE/${repo}.git"
            if git ls-remote --exit-code --tags "${repo_url}" "refs/tags/${TAG}" >/dev/null 2>&1; then
              echo "Cloning ${repo} at tag ${TAG}"
              git clone --depth=1 --branch "${TAG}" "${repo_url}" "${repo}"
            else
              echo "Tag ${TAG} not found in ${repo}. Cloning master."
              git clone --depth=1 --branch master "${repo_url}" "${repo}"
            fi
          done

      - name: Set Git identity
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Install workflow prerequisites
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            python3 \
            python-is-python3 \
            perl \
            ripgrep \
            gperf \
            pkg-config \
            xsltproc \
            libxml2-utils \
            libxml2-dev \
            libxslt1-dev \
            libxmlsec1-dev \
            libxmlsec1-openssl \
            symlinks \
            dpkg-dev \
            debhelper \
            devscripts \
            fakeroot

      - name: Apply concurrent connections limit
        run: |
          set -euo pipefail
          new_limit="${{ steps.params.outputs.connections_limit }}"
          target_file="${{ steps.params.outputs.connections_file }}"

          if ! [[ "${new_limit}" =~ ^[0-9]+$ ]]; then
            echo "Invalid connections limit: ${new_limit}" >&2
            exit 1
          fi

          if [[ -z "${target_file}" || ! -f "${target_file}" ]]; then
            echo "Configured connections file not found: ${target_file}" >&2
            exit 1
          fi

          candidate_file="${target_file}"
          before_hash="$(sha256sum "${candidate_file}" | awk '{print $1}')"
          perl -0777 -i -pe "
            s/(\\bLICENSE_CONNECTIONS\\b\\s*=\\s*)\\d+/\\1${new_limit}/g;
            s/(exports\\.LICENSE_CONNECTIONS\\s*=\\s*)\\d+/\\1${new_limit}/g;
          " "${candidate_file}"
          after_hash="$(sha256sum "${candidate_file}" | awk '{print $1}')"

          if [[ "${before_hash}" == "${after_hash}" ]]; then
            echo "No connection-limit change was applied in ${candidate_file}." >&2
            exit 1
          fi

          echo "Updated concurrent connections limit to ${new_limit} in ${candidate_file}"

      - name: Remove conflicting global grunt binary
        run: |
          set -euo pipefail
          sudo rm -f /usr/local/bin/grunt

      - name: Checkout build_tools by next-version compatibility window
        id: build_tools_checkout
        env:
          BUILD_TOOLS_REPO: ${{ steps.params.outputs.build_tools_repo }}
          TAG: ${{ steps.params.outputs.tag }}
          PACKAGE_VERSION: ${{ steps.params.outputs.package_version }}
        run: |
          set -euo pipefail

          build_tools_url="https://github.com/${BUILD_TOOLS_REPO}.git"

          rm -rf ./build_tools
          git init ./build_tools
          git -C ./build_tools remote add origin "${build_tools_url}"
          git -C ./build_tools fetch --force --prune --tags origin "+refs/heads/*:refs/remotes/origin/*"

          BUILD_TOOLS_REPO_PATH="${GITHUB_WORKSPACE}/build_tools" \
          DOCUMENT_TAG="${TAG}" \
          DOCUMENT_VERSION="${PACKAGE_VERSION}" \
          python3 - <<'PY' > "${RUNNER_TEMP}/build_tools_selection.env"
          import os
          import re
          import subprocess
          import sys

          repo = os.environ["BUILD_TOOLS_REPO_PATH"]
          document_tag = os.environ["DOCUMENT_TAG"]
          document_version = os.environ["DOCUMENT_VERSION"]

          def git(*args: str) -> str:
              return subprocess.check_output(args, text=True).strip()

          def normalize_tag(tag: str) -> str | None:
              match = re.fullmatch(r"v?(\d+\.\d+\.\d+)(?:[.-]\d+)?", tag)
              return match.group(1) if match else None

          document_tags_output = git(
              "git",
              "for-each-ref",
              "--format=%(refname:strip=2)\t%(creatordate:unix)",
              "refs/tags",
          )
          version_first_seen: dict[str, int] = {}
          for line in document_tags_output.splitlines():
              if not line.strip():
                  continue
              tag_name, timestamp_text = line.split("\t", 1)
              normalized = normalize_tag(tag_name)
              if normalized is None:
                  continue
              timestamp = int(timestamp_text)
              previous = version_first_seen.get(normalized)
              if previous is None or timestamp < previous:
                  version_first_seen[normalized] = timestamp

          current_version_timestamp = version_first_seen.get(document_version)
          if current_version_timestamp is None:
              raise SystemExit(
                  f"Could not resolve the first appearance date for DocumentServer version {document_version}."
              )

          next_version = ""
          newer_versions = sorted(
              (
                  (timestamp, version)
                  for version, timestamp in version_first_seen.items()
                  if timestamp > current_version_timestamp
              ),
              key=lambda item: (item[0], item[1]),
          )
          if newer_versions:
              next_version = newer_versions[0][1]

          bump_commit = ""
          bump_commit_timestamp = ""
          if next_version:
              log_output = git(
                  "git",
                  "-C",
                  repo,
                  "log",
                  "--all",
                  "--date-order",
                  "--format=COMMIT\t%H\t%ct\t%s",
                  "-p",
                  "--",
                  "version",
              )
              commit_blocks: list[list[str]] = []
              current_block: list[str] = []
              for line in log_output.splitlines():
                  if line.startswith("COMMIT\t"):
                      if current_block:
                          commit_blocks.append(current_block)
                      current_block = [line]
                  else:
                      current_block.append(line)
              if current_block:
                  commit_blocks.append(current_block)

              bump_candidates: list[tuple[int, str]] = []
              for block in commit_blocks:
                  header = block[0].split("\t", 3)
                  commit_sha = header[1]
                  commit_timestamp = int(header[2])
                  added_version = None
                  for line in block[1:]:
                      if line.startswith("+++") or line.startswith("---"):
                          continue
                      if line.startswith("+"):
                          added_version = line[1:]
                  if added_version == next_version:
                      bump_candidates.append((commit_timestamp, commit_sha))

              if not bump_candidates:
                  raise SystemExit(
                      f"Could not find a build_tools commit that updates version to {next_version}."
                  )

              bump_candidates.sort()
              bump_commit_timestamp, bump_commit = bump_candidates[0]

          selected_commit = ""
          selected_ref_kind = ""
          if bump_commit:
              rev_list_output = git(
                  "git",
                  "-C",
                  repo,
                  "rev-list",
                  "--all",
                  f"--before={bump_commit_timestamp}",
                  "--timestamp",
              )
              candidate_commits: list[tuple[int, str]] = []
              for line in rev_list_output.splitlines():
                  if not line.strip():
                      continue
                  timestamp_text, commit_sha = line.split(" ", 1)
                  try:
                      version_value = git("git", "-C", repo, "show", f"{commit_sha}:version")
                  except subprocess.CalledProcessError:
                      continue
                  if version_value == document_version:
                      candidate_commits.append((int(timestamp_text), commit_sha))

              if not candidate_commits:
                  raise SystemExit(
                      f"Could not find a build_tools commit before bump {bump_commit} with version {document_version}."
                  )

              candidate_commits.sort()
              selected_commit = candidate_commits[-1][1]
              selected_ref_kind = "pre_next_version_bump"
          else:
              selected_commit = git("git", "-C", repo, "rev-parse", "origin/master")
              selected_ref_kind = "origin_master_fallback"

          selected_version = git("git", "-C", repo, "show", f"{selected_commit}:version")
          if selected_version != document_version:
              raise SystemExit(
                  "Selected build_tools commit is incompatible: "
                  f"expected version {document_version}, got {selected_version} at {selected_commit}."
              )

          print(f"selected_ref={selected_commit}")
          print(f"selected_ref_kind={selected_ref_kind}")
          print(f"selected_version={selected_version}")
          print(f"next_document_version={next_version}")
          print(f"bump_commit={bump_commit}")
          PY

          . "${RUNNER_TEMP}/build_tools_selection.env"

          echo "Selected build_tools ref: ${selected_ref} (${selected_ref_kind})"
          if [[ -n "${bump_commit}" ]]; then
            echo "Detected next DocumentServer version: ${next_document_version}"
            echo "Detected build_tools bump commit: ${bump_commit}"
          fi
          echo "Validated build_tools version: ${selected_version}"

          git -C ./build_tools checkout --force "${selected_ref}"
          echo "selected_ref=${selected_ref}" >> "${GITHUB_OUTPUT}"
          echo "selected_ref_kind=${selected_ref_kind}" >> "${GITHUB_OUTPUT}"
          echo "selected_version=${selected_version}" >> "${GITHUB_OUTPUT}"
          echo "next_document_version=${next_document_version}" >> "${GITHUB_OUTPUT}"
          echo "bump_commit=${bump_commit}" >> "${GITHUB_OUTPUT}"

      - name: Validate build_tools core project list
        run: |
          set -euo pipefail
          if ! grep -Fq 'core/DesktopEditor/xmlsec/src/ooxmlsignature.pro' ./build_tools/sln.json; then
            echo "Selected build_tools ref is incompatible: ooxmlsignature project missing in sln.json" >&2
            exit 1
          fi

      - name: Install build_tools dependencies and Qt
        run: |
          set -euo pipefail
          cd ./build_tools/tools/linux
          python3 deps.py
          python3 qt_binary_fetch.py all

      - name: Configure and build project
        run: |
          set -euo pipefail
          tag="${{ steps.params.outputs.tag }}"
          branch="tags/${tag}"
          qt_dir="${GITHUB_WORKSPACE}/build_tools/tools/linux/qt_build/Qt-5.9.9"
          export PRODUCT_VERSION="${{ steps.params.outputs.package_version }}"
          export BUILD_NUMBER="${{ steps.params.outputs.package_build }}"
          export BRANCH_NAME="${branch}"

          if [[ -z "${tag}" ]]; then
            echo "Resolved tag is empty." >&2
            exit 1
          fi

          cd ./build_tools
          python3 ./configure.py \
            --module "server" \
            --platform "linux_64" \
            --update "0" \
            --branch "${branch}" \
            --qt-dir "${qt_dir}"
          python3 ./make.py

      - name: Wrap dpkg-deb for runner compatibility
        run: |
          set -euo pipefail

          mkdir -p "${HOME}/.local/bin"
          cat > "${HOME}/.local/bin/dpkg-deb" <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail

          args=()
          for arg in "$@"; do
            if [[ "${arg}" == --threads-max=* ]]; then
              continue
            fi
            args+=("${arg}")
          done

          exec /usr/bin/dpkg-deb "${args[@]}"
          EOF
          chmod +x "${HOME}/.local/bin/dpkg-deb"
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"

      - name: Package .deb
        run: |
          set -euo pipefail
          export PRODUCT_VERSION="${{ steps.params.outputs.package_version }}"
          export BUILD_NUMBER="${{ steps.params.outputs.package_build }}"
          export BRANCH_NAME="${{ steps.params.outputs.build_branch }}"
          cd ./build_tools
          python3 make_package.py \
            -P linux_x86_64 \
            -T server_community \
            -V "${PRODUCT_VERSION}" \
            -B "${BUILD_NUMBER}" \
            -H "${BRANCH_NAME}"

      - name: Upload .deb artifacts
        uses: actions/upload-artifact@v4
        with:
          name: onlyoffice-deb-${{ steps.params.outputs.tag }}
          path: |
            **/*.deb
          if-no-files-found: error

      - name: Ensure GitHub release exists
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${{ steps.params.outputs.tag }}"

          if ! gh release view "${tag}" >/dev/null 2>&1; then
            gh release create "${tag}" --title "${tag}" --verify-tag --generate-notes
          fi

      - name: Upload .deb assets to GitHub release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${{ steps.params.outputs.tag }}"
          shopt -s globstar nullglob
          debs=(**/*.deb)

          if [[ "${#debs[@]}" -eq 0 ]]; then
            echo "No .deb files found for release upload." >&2
            exit 1
          fi

          gh release upload "${tag}" "${debs[@]}" --clobber

      - name: Build summary
        run: |
          {
            echo "## Debian Build Summary"
            echo "- tag: ${{ steps.params.outputs.tag }}"
            echo "- package_version: ${{ steps.params.outputs.package_version }}"
            echo "- package_build: ${{ steps.params.outputs.package_build }}"
            echo "- build_branch: ${{ steps.params.outputs.build_branch }}"
            echo "- connections_limit: ${{ steps.params.outputs.connections_limit }}"
            echo "- build_tools_repo: ${{ steps.params.outputs.build_tools_repo }}"
            echo "- build_tools_ref_selected: ${{ steps.build_tools_checkout.outputs.selected_ref }}"
            echo "- build_tools_ref_kind: ${{ steps.build_tools_checkout.outputs.selected_ref_kind }}"
            echo "- build_tools_version_at_ref: ${{ steps.build_tools_checkout.outputs.selected_version }}"
            if [[ -n "${{ steps.build_tools_checkout.outputs.next_document_version }}" ]]; then
              echo "- next_document_version: ${{ steps.build_tools_checkout.outputs.next_document_version }}"
              echo "- build_tools_bump_commit: ${{ steps.build_tools_checkout.outputs.bump_commit }}"
            else
              echo "- next_document_version: <none>"
              echo "- build_tools_bump_commit: <fallback>"
            fi
            if [[ -n "${{ steps.params.outputs.connections_file }}" ]]; then
              echo "- connections_file: ${{ steps.params.outputs.connections_file }}"
            else
              echo "- connections_file: <auto-detect>"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"
