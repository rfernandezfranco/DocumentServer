name: Build Debian Package On Tag

on:
  push:
    tags:
      - "*"
  repository_dispatch:
    types:
      - upstream_tag_synced
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to build (optional; defaults to latest tag)
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: build-on-tag-${{ github.event.client_payload.tag || github.ref_name || github.event.inputs.tag || github.run_id }}
  cancel-in-progress: false

jobs:
  build-deb:
    runs-on: ubuntu-22.04

    steps:
      - name: Resolve build parameters
        id: params
        env:
          EVENT_NAME: ${{ github.event_name }}
          PUSH_TAG: ${{ github.ref_name }}
          DISPATCH_TAG: ${{ github.event.client_payload.tag }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          tag=""
          if [[ "${EVENT_NAME}" == "push" ]]; then
            tag="${PUSH_TAG}"
          elif [[ "${EVENT_NAME}" == "repository_dispatch" ]]; then
            tag="${DISPATCH_TAG}"
          else
            tag="${INPUT_TAG}"
          fi

          # Fallback: when event payload has no tag, resolve latest tag from repository API.
          if [[ -z "${tag}" ]]; then
            tag="$(
              GITHUB_TOKEN="${GITHUB_TOKEN}" GITHUB_REPOSITORY="${GITHUB_REPOSITORY}" \
              python3 -c 'import json,os,urllib.request; token=os.environ["GITHUB_TOKEN"]; repo=os.environ["GITHUB_REPOSITORY"]; req=urllib.request.Request(f"https://api.github.com/repos/{repo}/tags?per_page=1", headers={"Authorization": f"Bearer {token}", "Accept": "application/vnd.github+json"}); data=json.load(urllib.request.urlopen(req)); print(data[0]["name"] if data else "")'
            )"
          fi

          if [[ -z "${tag}" ]]; then
            echo "Tag could not be resolved for this run." >&2
            exit 1
          fi

          connections_limit="100"
          connections_file="server/Common/sources/constants.js"
          build_branch="tags/${tag}"
          package_version="${tag#v}"
          package_build="1"

          if [[ "${package_version}" =~ ^([0-9]+\.[0-9]+\.[0-9]+)\.([0-9]+)$ ]]; then
            package_version="${BASH_REMATCH[1]}"
            package_build="${BASH_REMATCH[2]}"
          elif [[ "${package_version}" =~ ^([0-9]+\.[0-9]+\.[0-9]+)-([0-9]+)$ ]]; then
            package_version="${BASH_REMATCH[1]}"
            package_build="${BASH_REMATCH[2]}"
          elif ! [[ "${package_version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Unsupported tag format for package versioning: ${tag}" >&2
            exit 1
          fi

          build_tools_repo="ONLYOFFICE/build_tools"

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "package_version=${package_version}" >> "${GITHUB_OUTPUT}"
          echo "package_build=${package_build}" >> "${GITHUB_OUTPUT}"
          echo "connections_limit=${connections_limit}" >> "${GITHUB_OUTPUT}"
          echo "connections_file=${connections_file}" >> "${GITHUB_OUTPUT}"
          echo "build_branch=${build_branch}" >> "${GITHUB_OUTPUT}"
          echo "build_tools_repo=${build_tools_repo}" >> "${GITHUB_OUTPUT}"

      - name: Checkout tag with submodules
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ steps.params.outputs.tag }}
          fetch-depth: 0
          submodules: false
          token: ${{ github.token }}

      - name: Configure submodules to upstream sources
        run: |
          set -euo pipefail

          while read -r key url; do
            if [[ "${url}" == ../* ]]; then
              repo="${url#../}"
              git config -f .gitmodules "${key}" "https://github.com/ONLYOFFICE/${repo}"
            fi
          done < <(git config -f .gitmodules --get-regexp '^submodule\..*\.url$' || true)

      - name: Initialize submodules
        run: |
          set -euo pipefail
          git config --global url."https://x-access-token:${{ github.token }}@github.com/".insteadOf "https://github.com/"
          git submodule sync --recursive
          git submodule update --init --recursive --jobs 8

      - name: Prepare additional repositories for local build layout
        env:
          TAG: ${{ steps.params.outputs.tag }}
        run: |
          set -euo pipefail

          required_repos=(
            "onlyoffice.github.io"
            "document-server-integration"
            "document-server-package"
            "document-templates"
            "document-formats"
          )

          for repo in "${required_repos[@]}"; do
            if [[ -d "${repo}/.git" ]]; then
              echo "Repository already present: ${repo}"
              continue
            fi

            repo_url="https://github.com/ONLYOFFICE/${repo}.git"
            if git ls-remote --exit-code --tags "${repo_url}" "refs/tags/${TAG}" >/dev/null 2>&1; then
              echo "Cloning ${repo} at tag ${TAG}"
              git clone --depth=1 --branch "${TAG}" "${repo_url}" "${repo}"
            else
              echo "Tag ${TAG} not found in ${repo}. Cloning master."
              git clone --depth=1 --branch master "${repo_url}" "${repo}"
            fi
          done

      - name: Set Git identity
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Install workflow prerequisites
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            python3 \
            python-is-python3 \
            perl \
            ripgrep \
            gperf \
            pkg-config \
            xsltproc \
            libxml2-utils \
            libxml2-dev \
            libxslt1-dev \
            libxmlsec1-dev \
            libxmlsec1-openssl \
            symlinks \
            dpkg-dev \
            debhelper \
            devscripts \
            fakeroot

      - name: Apply concurrent connections limit
        run: |
          set -euo pipefail
          new_limit="${{ steps.params.outputs.connections_limit }}"
          target_file="${{ steps.params.outputs.connections_file }}"

          if ! [[ "${new_limit}" =~ ^[0-9]+$ ]]; then
            echo "Invalid connections limit: ${new_limit}" >&2
            exit 1
          fi

          if [[ -z "${target_file}" || ! -f "${target_file}" ]]; then
            echo "Configured connections file not found: ${target_file}" >&2
            exit 1
          fi

          candidate_file="${target_file}"
          before_hash="$(sha256sum "${candidate_file}" | awk '{print $1}')"
          perl -0777 -i -pe "
            s/(\\bLICENSE_CONNECTIONS\\b\\s*=\\s*)\\d+/\\1${new_limit}/g;
            s/(exports\\.LICENSE_CONNECTIONS\\s*=\\s*)\\d+/\\1${new_limit}/g;
          " "${candidate_file}"
          after_hash="$(sha256sum "${candidate_file}" | awk '{print $1}')"

          if [[ "${before_hash}" == "${after_hash}" ]]; then
            echo "No connection-limit change was applied in ${candidate_file}." >&2
            exit 1
          fi

          echo "Updated concurrent connections limit to ${new_limit} in ${candidate_file}"

      - name: Remove conflicting global grunt binary
        run: |
          set -euo pipefail
          sudo rm -f /usr/local/bin/grunt

      - name: Checkout build_tools by nearest newer tag date
        id: build_tools_checkout
        env:
          BUILD_TOOLS_REPO: ${{ steps.params.outputs.build_tools_repo }}
          TAG: ${{ steps.params.outputs.tag }}
        run: |
          set -euo pipefail

          build_tools_url="https://github.com/${BUILD_TOOLS_REPO}.git"
          document_tag_timestamp="$(git log -1 --format=%ct "refs/tags/${TAG}")"

          if [[ -z "${document_tag_timestamp}" ]]; then
            echo "Could not resolve timestamp for tag ${TAG}" >&2
            exit 1
          fi

          rm -rf ./build_tools
          git init ./build_tools
          git -C ./build_tools remote add origin "${build_tools_url}"
          git -C ./build_tools fetch --force --filter=blob:none --tags origin

          selected_ref="$(
            DOCUMENT_TAG_TIMESTAMP="${document_tag_timestamp}" \
            python3 -c 'import os, subprocess, sys; document_ts=int(os.environ["DOCUMENT_TAG_TIMESTAMP"]); output=subprocess.check_output(["git","-C","./build_tools","for-each-ref","--format=%(refname:strip=2)\t%(creatordate:unix)","refs/tags"], text=True); tags=[]; [tags.append((name, int(ts))) for name, ts in (line.split("\t", 1) for line in output.splitlines() if line.strip())]; sys.exit("Could not resolve any build_tools tags") if not tags else None; newer_or_equal=[item for item in tags if item[1] >= document_ts]; print(sorted(newer_or_equal, key=lambda item: (item[1] - document_ts, item[1], item[0]))[0][0] if newer_or_equal else sorted(tags, key=lambda item: (item[1], item[0]), reverse=True)[0][0])'
          )"
          selected_ref_kind="date_fallback_tag"

          echo "Selected build_tools ref: ${selected_ref} (${selected_ref_kind})"
          git -C ./build_tools checkout --force "refs/tags/${selected_ref}"
          echo "selected_ref=${selected_ref}" >> "${GITHUB_OUTPUT}"
          echo "selected_ref_kind=${selected_ref_kind}" >> "${GITHUB_OUTPUT}"

      - name: Validate build_tools core project list
        run: |
          set -euo pipefail
          if ! grep -Fq 'core/DesktopEditor/xmlsec/src/ooxmlsignature.pro' ./build_tools/sln.json; then
            echo "Selected build_tools ref is incompatible: ooxmlsignature project missing in sln.json" >&2
            exit 1
          fi

      - name: Install build_tools dependencies and Qt
        run: |
          set -euo pipefail
          cd ./build_tools/tools/linux
          python3 deps.py
          python3 qt_binary_fetch.py all

      - name: Configure and build project
        run: |
          set -euo pipefail
          tag="${{ steps.params.outputs.tag }}"
          branch="tags/${tag}"
          qt_dir="${GITHUB_WORKSPACE}/build_tools/tools/linux/qt_build/Qt-5.9.9"
          export PRODUCT_VERSION="${{ steps.params.outputs.package_version }}"
          export BUILD_NUMBER="${{ steps.params.outputs.package_build }}"
          export BRANCH_NAME="${branch}"

          if [[ -z "${tag}" ]]; then
            echo "Resolved tag is empty." >&2
            exit 1
          fi

          cd ./build_tools
          python3 ./configure.py \
            --module "server" \
            --platform "linux_64" \
            --update "0" \
            --branch "${branch}" \
            --qt-dir "${qt_dir}"
          python3 ./make.py

      - name: Wrap dpkg-deb for runner compatibility
        run: |
          set -euo pipefail

          mkdir -p "${HOME}/.local/bin"
          cat > "${HOME}/.local/bin/dpkg-deb" <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail

          args=()
          for arg in "$@"; do
            if [[ "${arg}" == --threads-max=* ]]; then
              continue
            fi
            args+=("${arg}")
          done

          exec /usr/bin/dpkg-deb "${args[@]}"
          EOF
          chmod +x "${HOME}/.local/bin/dpkg-deb"
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"

      - name: Package .deb
        run: |
          set -euo pipefail
          export PRODUCT_VERSION="${{ steps.params.outputs.package_version }}"
          export BUILD_NUMBER="${{ steps.params.outputs.package_build }}"
          export BRANCH_NAME="${{ steps.params.outputs.build_branch }}"
          cd ./build_tools
          python3 make_package.py \
            -P linux_x86_64 \
            -T server_community \
            -V "${PRODUCT_VERSION}" \
            -B "${BUILD_NUMBER}" \
            -H "${BRANCH_NAME}"

      - name: Upload .deb artifacts
        uses: actions/upload-artifact@v4
        with:
          name: onlyoffice-deb-${{ steps.params.outputs.tag }}
          path: |
            **/*.deb
          if-no-files-found: error

      - name: Ensure GitHub release exists
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${{ steps.params.outputs.tag }}"

          if ! gh release view "${tag}" >/dev/null 2>&1; then
            gh release create "${tag}" --title "${tag}" --verify-tag --generate-notes
          fi

      - name: Upload .deb assets to GitHub release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${{ steps.params.outputs.tag }}"
          shopt -s globstar nullglob
          debs=(**/*.deb)

          if [[ "${#debs[@]}" -eq 0 ]]; then
            echo "No .deb files found for release upload." >&2
            exit 1
          fi

          gh release upload "${tag}" "${debs[@]}" --clobber

      - name: Build summary
        run: |
          {
            echo "## Debian Build Summary"
            echo "- tag: ${{ steps.params.outputs.tag }}"
            echo "- package_version: ${{ steps.params.outputs.package_version }}"
            echo "- package_build: ${{ steps.params.outputs.package_build }}"
            echo "- build_branch: ${{ steps.params.outputs.build_branch }}"
            echo "- connections_limit: ${{ steps.params.outputs.connections_limit }}"
            echo "- build_tools_repo: ${{ steps.params.outputs.build_tools_repo }}"
            echo "- build_tools_ref_selected: ${{ steps.build_tools_checkout.outputs.selected_ref }}"
            echo "- build_tools_ref_kind: ${{ steps.build_tools_checkout.outputs.selected_ref_kind }}"
            if [[ -n "${{ steps.params.outputs.connections_file }}" ]]; then
              echo "- connections_file: ${{ steps.params.outputs.connections_file }}"
            else
              echo "- connections_file: <auto-detect>"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"
